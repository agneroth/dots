# starship catppuccin powerline

"$schema" = 'https://starship.rs/config-schema.json'

format = """
[оӮ¶](red)\
$os\
[оӮ°](bg:peach fg:red)\
$directory\
[оӮ°](bg:yellow fg:peach)\
$git_branch\
$git_status\
[оӮ°](fg:yellow bg:green)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$terraform\
$python\
[оӮ°](fg:green bg:sapphire)\
$conda\
$kubernetes\
$env_var\
[оӮ°](fg:sapphire bg:lavender)\
[оӮҙ ](fg:lavender)\
$cmd_duration\
$line_break\
$character"""

palette = 'catppuccin_macchiato'

[os]
disabled = false
style = "bg:red fg:crust"

[os.symbols]
Windows = "оңҸ"
Ubuntu = "у°•Ҳ"
SUSE = "пҢ”"
Raspbian = "у°җҝ"
Mint = "у°Јӯ"
Macos = "у°Җө"
Manjaro = "пҢ’"
Linux = "у°ҢҪ"
Gentoo = "у°ЈЁ"
Fedora = "у°Јӣ"
Alpine = "пҢҖ"
Amazon = "пү°"
Android = "оңҺ"
Arch = "у°ЈҮ"
Artix = "у°ЈҮ"
CentOS = "пҢ„"
Debian = "у°Јҡ"
Redhat = "уұ„ӣ"
RedHatEnterprise = "уұ„ӣ"

[username]
show_always = true
style_user = "bg:red fg:crust"
style_root = "bg:red fg:crust"
format = '[ $user]($style)'

[directory]
style = "bg:peach fg:crust"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "у°қҡ "
"Pictures" = "пҖҫ "
"Developer" = "у°ІӢ "

[git_branch]
symbol = "пҗҳ"
style = "bg:yellow"
format = '[[ $symbol $branch ](fg:crust bg:yellow)]($style)'

[git_status]
style = "bg:yellow"
format = '[[($all_status$ahead_behind )](fg:crust bg:yellow)]($style)'

[nodejs]
symbol = "оңҳ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[c]
symbol = "оҳһ "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[rust]
symbol = "оһЁ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[golang]
symbol = "оҳ§"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[php]
symbol = "оҳҲ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[java]
symbol = "оү– "
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[kotlin]
symbol = "оҳҙ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[haskell]
symbol = "оҳҹ"
style = "bg:green"
format = '[[ $symbol( $version) ](fg:crust bg:green)]($style)'

[python]
symbol = "оҳҶ"
style = "bg:green"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:crust bg:green)]($style)'

[terraform]
symbol = " оўҪ "
style = "bg:green"
format = '[[$symbol$workspace ](fg:crust bg:green)]($style)'

[kubernetes]
format = '[[ уұғҫ  $context ](fg:crust bg:sapphire)]($style)'
style = "bg:sapphire"
detect_env_vars = ["KUBECONFIG"]
disabled = false

[[kubernetes.contexts]]
# Using capture groups
# Contexts from GKE, AWS and other cloud providers usually carry additional information, like the region/zone.
# The following entry matches on the GKE format (`gke_projectname_zone_cluster-name`)
# and renames every matching kube context into a more readable format (`gke-cluster-name`):
context_pattern = "gke_.*_(?P<cluster>[\\w-]+)"
context_alias = "gke-$cluster"

[env_var]
variable = "HTTPS_PROXY"
symbol = "оҳ•"
style = "bg:sapphire"
format = '[[$symbol HTTPS_PROXY ](fg:crust bg:sapphire)]($style)'

[docker_context]
symbol = "пҢҲ"
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:crust bg:sapphire)]($style)'

[conda]
symbol = " п„Ң "
style = "fg:crust bg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:lavender"
format = '[[ пҗә $time ](fg:crust bg:lavender)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[вқҜ](bold fg:green)'
error_symbol = '[вқҜ](bold fg:red)'
vimcmd_symbol = '[вқ®](bold fg:green)'
vimcmd_replace_one_symbol = '[вқ®](bold fg:lavender)'
vimcmd_replace_symbol = '[вқ®](bold fg:lavender)'
vimcmd_visual_symbol = '[вқ®](bold fg:yellow)'

[cmd_duration]
show_milliseconds = true
format = "о«ҙ in $duration "
style = "bg:lavender"
disabled = false
show_notifications = true
min_time_to_notify = 45000

